kind = "web"
previewPath = "/"
title = "kri8"
version = "1.0.0"
id = "artifacts/kri8"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21177

[services.development]
run = "pnpm --filter @workspace/kri8 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kri8", "run", "build" ]
publicDir = "artifacts/kri8/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21177"
BASE_PATH = "/"
