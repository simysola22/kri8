services:
  - type: web
    name: kri8-api
    runtime: node
    buildCommand: pnpm install --no-frozen-lockfile && pnpm run build
    startCommand: pnpm --filter @workspace/api-server start
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false          # set in Render dashboard
      - key: CLERK_SECRET_KEY
        sync: false          # set in Render dashboard
      - key: CLERK_PUBLISHABLE_KEY
        sync: false          # set in Render dashboard
      - key: ALLOWED_ORIGIN
        sync: false          # comma-separated; e.g. https://kri8.vercel.app,https://kri8.com
      - key: TREND_PROVIDER
        value: mock          # change to youtube + add YOUTUBE_API_KEY if needed
      - key: OPENAI_API_KEY
        sync: false          # optional — enables AI inspiration engine
