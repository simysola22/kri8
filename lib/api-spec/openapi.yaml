openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: kri8 API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: ideas
    description: Idea management
  - name: users
    description: User profile management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
    patch:
      operationId: updateMe
      tags: [users]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /ideas:
    get:
      operationId: listIdeas
      tags: [ideas]
      summary: List all ideas for the current user
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: Search query for title or insight
        - name: is_used
          in: query
          schema:
            type: boolean
          description: Filter by used status
        - name: parent_id
          in: query
          schema:
            type: ["integer", "null"]
          description: Filter by parent idea id (null for root ideas)
      responses:
        "200":
          description: List of ideas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Idea"
    post:
      operationId: createIdea
      tags: [ideas]
      summary: Create a new idea
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdeaInput"
      responses:
        "201":
          description: Created idea
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Idea"

  /ideas/stats:
    get:
      operationId: getIdeaStats
      tags: [ideas]
      summary: Get idea statistics for dashboard
      responses:
        "200":
          description: Idea statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdeaStats"

  /ideas/recent:
    get:
      operationId: getRecentIdeas
      tags: [ideas]
      summary: Get recently created ideas
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
          description: Number of recent ideas to return
      responses:
        "200":
          description: Recent ideas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Idea"

  /ideas/{id}:
    get:
      operationId: getIdea
      tags: [ideas]
      summary: Get a single idea with its branches
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Idea detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdeaDetail"
        "404":
          description: Not found
    patch:
      operationId: updateIdea
      tags: [ideas]
      summary: Update an idea
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdeaUpdate"
      responses:
        "200":
          description: Updated idea
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Idea"
    delete:
      operationId: deleteIdea
      tags: [ideas]
      summary: Delete an idea and all its branches
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /ideas/{id}/mark-used:
    post:
      operationId: markIdeaUsed
      tags: [ideas]
      summary: Mark an idea as used
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkUsedInput"
      responses:
        "200":
          description: Updated idea
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Idea"

  /ideas/{id}/branches:
    get:
      operationId: listBranches
      tags: [ideas]
      summary: List all branches of an idea (recursive)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of branches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Idea"
    post:
      operationId: createBranch
      tags: [ideas]
      summary: Create a branch of an idea
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BranchInput"
      responses:
        "201":
          description: Created branch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Idea"

  /profile/{username}:
    get:
      operationId: getPublicProfile
      tags: [users]
      summary: Get a user's public profile and ideas
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Public profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicProfile"
        "404":
          description: Not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    User:
      type: object
      properties:
        id:
          type: integer
        clerkUserId:
          type: string
        email:
          type: string
        name:
          type: ["string", "null"]
        username:
          type: ["string", "null"]
        themePreference:
          type: string
        createdAt:
          type: string
      required:
        - id
        - clerkUserId
        - email
        - themePreference
        - createdAt

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        username:
          type: string
        themePreference:
          type: string

    Idea:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        title:
          type: string
        insight:
          type: ["string", "null"]
        origin:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        videoEditingNotes:
          type: ["string", "null"]
        createdDate:
          type: string
        usedDate:
          type: ["string", "null"]
        customDate:
          type: ["string", "null"]
        isUsed:
          type: boolean
        parentIdeaId:
          type: ["integer", "null"]
        branchCount:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - userId
        - title
        - isUsed
        - branchCount
        - createdDate
        - createdAt
        - updatedAt

    IdeaDetail:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        title:
          type: string
        insight:
          type: ["string", "null"]
        origin:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        videoEditingNotes:
          type: ["string", "null"]
        createdDate:
          type: string
        usedDate:
          type: ["string", "null"]
        customDate:
          type: ["string", "null"]
        isUsed:
          type: boolean
        parentIdeaId:
          type: ["integer", "null"]
        branchCount:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
        branches:
          type: array
          items:
            $ref: "#/components/schemas/Idea"
      required:
        - id
        - userId
        - title
        - isUsed
        - branchCount
        - createdDate
        - createdAt
        - updatedAt
        - branches

    IdeaInput:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        insight:
          type: string
        origin:
          type: string
        notes:
          type: string
        videoEditingNotes:
          type: string
        customDate:
          type: string
      required:
        - title

    IdeaUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        insight:
          type: string
        origin:
          type: string
        notes:
          type: string
        videoEditingNotes:
          type: string
        customDate:
          type: string
        usedDate:
          type: string
        isUsed:
          type: boolean
        themePreference:
          type: string

    BranchInput:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        insight:
          type: string
        notes:
          type: string
        videoEditingNotes:
          type: string
      required:
        - title

    MarkUsedInput:
      type: object
      properties:
        usedDate:
          type: string

    IdeaStats:
      type: object
      properties:
        total:
          type: integer
        used:
          type: integer
        unused:
          type: integer
        withBranches:
          type: integer
        totalBranches:
          type: integer
        createdThisWeek:
          type: integer
        createdThisMonth:
          type: integer
      required:
        - total
        - used
        - unused
        - withBranches
        - totalBranches
        - createdThisWeek
        - createdThisMonth

    PublicProfile:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        ideas:
          type: array
          items:
            $ref: "#/components/schemas/IdeaDetail"
      required:
        - user
        - ideas
